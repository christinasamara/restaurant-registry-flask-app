<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ restaurant.name }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .detail-card { border-radius: 15px; border: none; }
        .brand-orange { color: #e67e22; }
    </style>
</head>
<body>

<div class="container py-5">
    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary mb-4">
        ← Back to all restaurants
    </a>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg detail-card">
                <div class="card-body p-5">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h1 class="display-4 fw-bold mb-0">{{ restaurant.name }}</h1>
                        <span class="badge bg-warning text-dark fs-5">{{ restaurant.rating }} ★</span>
                    </div>
                    
                    <h3 class="text-primary mb-4">{{ restaurant.cuisine }}</h3>
                    <hr>

                    <div class="row text-center mt-5">
                        <div class="col-6 border-end">
                            <h6 class="text-muted text-uppercase small fw-bold">Delivery Time</h6>
                            <p class="fs-3 mb-0">{{ restaurant.delivery_time_mins }} mins</p>
                        </div>
                        <div class="col-6">
                            <h6 class="text-muted text-uppercase small fw-bold">Restaurant ID</h6>
                            <p class="fs-3 mb-0">#{{ restaurant.id }}</p>
                        </div>
                    </div>

                    <div class="mt-5 p-4 bg-light rounded text-center">
                        <p class="text-muted italic">"Menu and contact information coming soon in the next update."</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
