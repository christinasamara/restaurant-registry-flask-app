<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Restaurant Finder 2026</title>
</head>

<body>
    <div class="container mt-5">
        <header class="mb-4">
            <h1 class="display-4">Flavor Finder</h1>
            <p class="lead">Discover your next favorite meal.</p>
        </header>

        <main>
            <div class="row">
                {% for restaurant in restaurants %}
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">{{ restaurant.name }}</h5>
                            <h6 class="card-subtitle mb-2 text-muted">{{ restaurant.cuisine }}</h6>
                            <p class="card-text">
                                <span class="badge bg-success">{{ restaurant.rating }} ★</span>
                                <br>
                                <small class="text-muted">Delivery: {{ restaurant.delivery_time_mins }} mins</small>
                            </p>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Engineering Assessment Prep</p>
        </footer>
    </div>
</body>

</html>
